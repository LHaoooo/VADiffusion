training:
  L1: false
  loss_type: eps  # min_snr_gamma_eps/x0/x0+g/v
  batch_size: 8
  n_epochs: 10000
  n_iters: 50001
  save_freq: 1000
  val_step: 500
  val_freq: 1000
  log_freq: 100
  log_all_sigmas: false

eval:
  wr: 0.01
  wp: 1
  gt_dir: ./data
  batch_size: 128
  early_end: 10

sampling:
  batch_size: 100
  data_init: false
  ckpt_id: 0
  final_only: true
  fid: false
  ssim: true
  fvd: true
  denoise: true
  subsample: 50
  num_samples4fid: 10000
  num_samples4fvd: 10000
  inpainting: false
  interpolation: false
  n_interpolations: 15
  consistent: true
  step_lr: 0.0
  n_steps_each: 0
  train: false
  num_frames_pred: 20
  clip_before: true
  max_data_iter: 100000
  init_prev_t: -1.0 # if >0, we start next_frame at prev_frame starting with noise t=init_prev_t
  one_frame_at_a_time: false
  preds_per_test: 1

test:
  begin_ckpt: 500
  end_ckpt: 46000
  batch_size: 64
  freq: 500
  ckpt_path: /home/VADiffusion/exp2/logs_lossE
  ckpt: /home/VADiffusion/exp2/logs_lossE/checkpoint_46000.pth

data:
  dataset: "avenue"
  image_size: 256
  # channels: 1
  num_workers: 8
  num_digits: 2
  step_length: 0.1
  num_frames: 4
  num_frames_cond: 4
  num_frames_future: 0
  prob_mask_cond: 0.0
  prob_mask_future: 0.0
  prob_mask_sync: false

model:
  ImgChnNum: 3
  sampled_mv_num : 3
  clip_hist: 4
  clip_pred: 1
  feature_root: 16
  skip_ops: [ "none", "none", "none","none"]
  motion_channels: 2
  recon_MV_pretrained: /home/VADiffusion/mv_ckpt/avenue_mv_recon_stack_mv_123456/stackbest.pth
  depth: deep
  version: DDIM  # DDIM
  gamma: false   # 是否使用gamma分布去生成初始数据
  arch: unetmore
  type: v1
  time_conditional: true
  dropout: 0.1
  sigma_dist: linear
  sigma_begin: 0.02
  sigma_end: 0.0001
  num_classes: 1000
  ema: true
  ema_rate: 0.999
  spec_norm: false
  normalization: InstanceNorm++
  nonlinearity: swish
  ngf: 16  # 64
  ch_mult:   # [1,2,3,4,4,4]
    - 1
    - 2
    - 3
    - 4
  num_res_blocks: 2 # 8 for traditional
  attn_resolutions: 
    - 8
    - 16
    - 32 # can use only 16 for traditional
  n_head_channels: 32 # -1 for traditional  64
  conditional: true
  noise_in_cond: false
  output_all_frames: false # could be useful especially for 3d models
  cond_emb: false
  spade: false  # 是否采用空间自适应归一化 
  spade_dim: 128
  pretrained: None

optim:
  weight_decay: 0.000
  optimizer: "Adam"
  lr: 0.0005
  warmup: 1000
  beta1: 0.9
  amsgrad: false
  eps: 0.00000001
  grad_clip: 1.0
